name: cargo-bill

on:
  pull_request:
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  cost-estimation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bill
        run: cargo install cargo-bill

      - name: Estimate Lambda Cost
        id: cargo_bill
        run: |
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          cargo bill lambda --markdown >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ${{ steps.cargo_bill.outputs.REPORT }}
          comment_tag: cargo-bill-report
